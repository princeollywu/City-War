<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>City-War</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #1a1a2e;
    color: #e0e0e0;
    font-family: 'Segoe UI', system-ui, sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  h1 {
    font-size: 1.8rem;
    text-align: center;
    padding: 12px 0 8px;
    color: #ffd700;
    text-shadow: 0 0 14px #ffd70099;
    letter-spacing: 3px;
  }

  #app {
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 100%;
    max-width: 960px;
    padding: 0 8px 20px;
  }

  /* ── START MENU ─────────────────────────── */
  #start-menu {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    margin-top: 30px;
    width: 340px;
  }
  #start-menu h2 { color: #aad4ff; font-size: 1rem; letter-spacing: 1px; }

  .level-btn {
    width: 100%;
    padding: 13px 18px;
    border: 2px solid #2a3050;
    border-radius: 10px;
    background: #16213e;
    color: #e0e0e0;
    font-size: 0.95rem;
    cursor: pointer;
    transition: border-color .18s, background .18s;
    text-align: left;
  }
  .level-btn:hover { border-color: #ffd700; background: #1e2d50; }
  .level-btn .lvl-title { font-weight: bold; color: #ffd700; font-size: 1rem; }
  .level-btn .lvl-desc  { font-size: 0.78rem; color: #999; margin-top: 4px; }

  /* ── GAME LAYOUT ────────────────────────── */
  #game-area {
    display: none;
    gap: 14px;
    align-items: flex-start;
    justify-content: center;
    flex-wrap: wrap;
    width: 100%;
  }

  /* ── GRID ───────────────────────────────── */
  #grid {
    display: grid;
    grid-template-columns: repeat(6, 70px);
    grid-template-rows: repeat(6, 70px);
    gap: 4px;
  }

  .tile {
    width: 70px; height: 70px;
    border-radius: 7px;
    border: 2px solid transparent;
    background: #252535;
    position: relative;
    cursor: pointer;
    overflow: hidden;
    transition: border-color .15s;
    user-select: none;
  }
  .tile:hover:not(.fog) { filter: brightness(1.15); z-index: 2; }

  .tile.owner-p1 { background: #0e1f48; }
  .tile.owner-p2 { background: #3c0e0e; }
  .tile.fog      { background: #10101a; cursor: default; }

  .tile.selected   { border-color: #ffd700 !important; box-shadow: 0 0 10px #ffd700aa; }
  .tile.targetable { border-color: #ff3333; animation: pulse-r .65s infinite alternate; }
  .tile.buildable  { border-color: #33ff88; animation: pulse-g .65s infinite alternate; }

  @keyframes pulse-r { to { box-shadow: 0 0 10px #ff333388; } }
  @keyframes pulse-g { to { box-shadow: 0 0 10px #33ff8888; } }

  .tile.hit-flash { animation: hit-anim .42s ease; }
  @keyframes hit-anim {
    0%   { filter: brightness(1); transform: translate(0,0); }
    12%  { filter: brightness(3) saturate(4); transform: translate(-3px,2px); }
    28%  { filter: brightness(2.2) saturate(2.5); transform: translate(3px,-2px); }
    50%  { filter: brightness(1.8); transform: translate(-2px,1px); }
    75%  { filter: brightness(1.3); transform: translate(1px,-1px); }
    100% { filter: brightness(1); transform: translate(0,0); }
  }

  /* tile contents */
  .t-building {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -60%);
    font-size: 1.55rem;
    line-height: 1;
    pointer-events: none;
  }
  .t-unit {
    position: absolute;
    bottom: 20px; left: 4px;
    font-size: 0.9rem;
    line-height: 1;
    pointer-events: none;
  }
  .fog-icon {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%,-50%);
    font-size: 1.7rem;
    opacity: .45;
    pointer-events: none;
  }
  .acted-dot {
    position: absolute;
    top: 4px; right: 4px;
    width: 7px; height: 7px;
    background: #777;
    border-radius: 50%;
  }

  /* HP bars */
  .hp-bars {
    position: absolute;
    bottom: 2px; left: 2px; right: 2px;
    display: flex; flex-direction: column; gap: 2px;
  }
  .hpbw { height: 4px; background: #ffffff1a; border-radius: 2px; overflow: hidden; }
  .hpbf { height: 100%; border-radius: 2px; transition: width .25s; }
  .hpbf.bldg { background: #4499ff; }
  .hpbf.unit { background: #44ee88; }

  /* ── PROJECTILE ─────────────────────────── */
  .projectile {
    position: fixed;
    font-size: 1.15rem;
    pointer-events: none;
    z-index: 999;
    transition: left .42s linear, top .42s linear;
    animation: pfade .55s ease forwards;
  }
  @keyframes pfade {
    0%   { opacity: 1; }
    70%  { opacity: .9; }
    100% { opacity: 0; }
  }

  /* ── RIGHT PANEL ────────────────────────── */
  #panel {
    flex: 0 0 230px;
    display: flex;
    flex-direction: column;
    gap: 9px;
    min-width: 210px;
  }
  .pbox {
    background: #16213e;
    border: 1px solid #2a3050;
    border-radius: 8px;
    padding: 10px 12px;
  }
  .pbox h3 {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 1.2px;
    color: #888;
    margin-bottom: 7px;
  }
  #turn-ind  { font-size: 1rem; font-weight: bold; }
  #turn-num  { color: #888; font-size: 0.82rem; margin-top: 3px; }

  .res-row { display: flex; justify-content: space-between; margin-bottom: 5px; align-items: center; }
  .res-label { color: #999; font-size: 0.78rem; }
  .res-vals  { display: flex; gap: 7px; font-size: 0.82rem; }
  .rv-p1 { color: #6699ff; }
  .rv-p2 { color: #ff7766; }
  .ritem { display: flex; align-items: center; gap: 2px; }

  #actions { display: flex; flex-direction: column; gap: 5px; }
  .abtn {
    padding: 7px 10px;
    border-radius: 6px;
    border: 1px solid #2a3560;
    background: #1a2a50;
    color: #dde;
    cursor: pointer;
    font-size: 0.83rem;
    text-align: left;
    transition: background .12s, border-color .12s;
  }
  .abtn:hover:not(:disabled) { background: #243466; border-color: #557; }
  .abtn:disabled { opacity: .38; cursor: default; }
  .abtn.active   { background: #243466; border-color: #ffd700; color: #ffd700; }
  .abtn.end-btn  { border-color: #554; color: #ffd700; margin-top: 3px; }

  #submenu, #train-submenu {
    display: none;
    flex-direction: column;
    gap: 4px;
    padding: 6px;
    background: #0f1520;
    border-radius: 6px;
    border: 1px solid #2a3050;
  }
  #submenu.vis, #train-submenu.vis { display: flex; }
  .sbtn {
    padding: 5px 8px;
    border-radius: 5px;
    border: 1px solid #2a3050;
    background: #16213e;
    color: #dde;
    cursor: pointer;
    font-size: 0.79rem;
    text-align: left;
    transition: background .12s;
  }
  .sbtn:hover:not(:disabled) { background: #1e3060; border-color: #446; }
  .sbtn:disabled { opacity: .38; cursor: default; }
  .sbtn .cost { color: #999; font-size: 0.73rem; }

  #log-list {
    list-style: none;
    font-size: 0.74rem;
    display: flex; flex-direction: column; gap: 2px;
    max-height: 130px;
    overflow-y: auto;
  }
  #log-list li { padding: 2px 4px; border-radius: 3px; line-height: 1.3; }
  .lp1  { color: #88aaff; }
  .lp2  { color: #ff8877; }
  .lsys { color: #ffdd88; }
  .lwin { color: #44ff88; font-weight: bold; }

  #new-game-btn {
    padding: 8px; border-radius: 6px;
    border: 1px solid #554; background: #201800;
    color: #ffd700; cursor: pointer; font-size: 0.83rem;
    transition: background .12s;
  }
  #new-game-btn:hover { background: #302000; }

  /* ── WIN OVERLAY ────────────────────────── */
  #win-overlay {
    display: none; position: fixed; inset: 0;
    background: #000000bb;
    align-items: center; justify-content: center;
    z-index: 1000; flex-direction: column; gap: 0;
  }
  #win-overlay.vis { display: flex; }
  #win-box {
    background: #1a1a2e;
    border: 3px solid #ffd700;
    border-radius: 18px;
    padding: 44px 64px;
    text-align: center;
  }
  #win-text { font-size: 2rem; color: #ffd700; margin-bottom: 8px; }
  #win-sub  { color: #aaa; margin-bottom: 22px; font-size: 0.95rem; }
  #win-again {
    padding: 10px 28px; border-radius: 8px;
    border: 2px solid #ffd700; background: #201800;
    color: #ffd700; font-size: 1rem; cursor: pointer;
  }
  #win-again:hover { background: #302000; }

  /* responsive */
  @media (max-width: 620px) {
    #grid { grid-template-columns: repeat(6, 52px); grid-template-rows: repeat(6, 52px); gap: 3px; }
    .tile { width: 52px; height: 52px; }
    .t-building { font-size: 1.2rem; }
    .t-unit { font-size: 0.72rem; bottom: 15px; }
    #panel { flex: 1 1 100%; }
    #game-area { flex-direction: column; align-items: center; }
  }
</style>
</head>
<body>
<div id="app">
  <h1>⚔ CITY-WAR ⚔</h1>

  <!-- Start Menu -->
  <div id="start-menu">
    <h2>SELECT CAMPAIGN LEVEL</h2>
    <button class="level-btn" onclick="startGame(1)">
      <div class="lvl-title">Level 1 — Valley Skirmish</div>
      <div class="lvl-desc">Easy · Houses and towers. AI attacks every other turn.</div>
    </button>
    <button class="level-btn" onclick="startGame(2)">
      <div class="lvl-title">Level 2 — Stone Fortress</div>
      <div class="lvl-desc">Medium · Walls, quarries, multiple towers. AI attacks every turn.</div>
    </button>
    <button class="level-btn" onclick="startGame(3)">
      <div class="lvl-title">Level 3 — Iron War</div>
      <div class="lvl-desc">Hard · Barracks, archers, knights. AI attacks aggressively every turn.</div>
    </button>
  </div>

  <!-- Game Area -->
  <div id="game-area">
    <div id="grid-wrap">
      <div id="grid"></div>
    </div>
    <div id="panel">
      <!-- Turn -->
      <div class="pbox">
        <div id="turn-ind" style="color:#6699ff;">⚔ Player 1's Turn</div>
        <div id="turn-num">Turn 1</div>
      </div>
      <!-- Resources -->
      <div class="pbox">
        <h3>Resources</h3>
        <div class="res-row">
          <span class="res-label">Player 1</span>
          <span class="res-vals rv-p1">
            <span class="ritem">🪙<span id="p1g">60</span></span>
            <span class="ritem">🪵<span id="p1w">20</span></span>
            <span class="ritem">⛏<span id="p1s">10</span></span>
          </span>
        </div>
        <div class="res-row">
          <span class="res-label">Player 2 (AI)</span>
          <span class="res-vals rv-p2">
            <span class="ritem">🪙<span id="p2g">60</span></span>
            <span class="ritem">🪵<span id="p2w">20</span></span>
            <span class="ritem">⛏<span id="p2s">10</span></span>
          </span>
        </div>
      </div>
      <!-- Actions -->
      <div class="pbox">
        <h3>Actions</h3>
        <div id="actions">
          <button class="abtn" id="btn-attack" onclick="setMode('attack')">⚔ Attack</button>
          <button class="abtn" id="btn-build"  onclick="toggleBuild()">🏗 Build</button>
          <div id="submenu"></div>
          <button class="abtn" id="btn-train"  onclick="toggleTrain()">🪖 Train Unit</button>
          <div id="train-submenu"></div>
          <button class="abtn" id="btn-repair" onclick="setMode('repair')">🔧 Repair  <span style="color:#aaa;font-size:.75rem">(5g = +10 HP)</span></button>
          <button class="abtn end-btn" id="btn-end" onclick="endPlayerTurn()">⏭ End Turn</button>
        </div>
      </div>
      <!-- Log -->
      <div class="pbox">
        <h3>Event Log</h3>
        <ul id="log-list"></ul>
      </div>
      <button id="new-game-btn" onclick="showStartMenu()">↩ New Game</button>
    </div>
  </div>
</div>

<!-- Win overlay -->
<div id="win-overlay">
  <div id="win-box">
    <div id="win-text">Victory!</div>
    <div id="win-sub">The battle is over.</div>
    <button id="win-again" onclick="showStartMenu()">Play Again</button>
  </div>
</div>

<script>
'use strict';

// ══════════════════════════════════════════════════════
//  DATA TABLES
// ══════════════════════════════════════════════════════
const BDEF = {
  manor:   { emoji:'🏰', hp:50, cost:{},          income:{},       name:'Manor',       revealRange:1 },
  house:   { emoji:'🏠', hp:20, cost:{g:20},       income:{g:5},    name:'House'        },
  tower:   { emoji:'🗼', hp:30, cost:{g:30,s:10},  income:{},       name:'Tower',       atkRange:2, atkDmg:15, atkCost:10, revealRange:2 },
  barracks:{ emoji:'⚔️', hp:25, cost:{g:40,w:20},  income:{},       name:'Barracks'     },
  lumber:  { emoji:'🪵', hp:20, cost:{g:25},        income:{w:3},    name:'Lumber Mill'  },
  quarry:  { emoji:'⛏️', hp:20, cost:{g:25},        income:{s:2},    name:'Quarry'       },
  wall:    { emoji:'🧱', hp:40, cost:{g:5,s:5},     income:{},       name:'Wall'         },
};

const UDEF = {
  archer: { emoji:'🏹', maxHp:15, dmg:15, range:3, cost:{g:20,w:10}, name:'Archer', revealRange:3 },
  knight: { emoji:'⚔️', maxHp:20, dmg:25, range:1, cost:{g:30,w:10}, name:'Knight', revealRange:1 },
};

const BUILDABLE = ['house','tower','barracks','lumber','quarry','wall'];

// ══════════════════════════════════════════════════════
//  GAME STATE
// ══════════════════════════════════════════════════════
let G = null;

// interaction state
let selTile  = null;   // {r,c} of selected tile
let mode     = null;   // 'attack'|'build'|'repair'|'train'|null
let bldType  = null;   // building type chosen in build submenu
let unitType = null;   // unit type chosen in train submenu

// ══════════════════════════════════════════════════════
//  GRID HELPERS
// ══════════════════════════════════════════════════════
function makeTile(r, c) {
  return { r, c, owner:0, bld:null, unit:null, fog:false };
}

function makeGrid() {
  const g = [];
  for (let r=0;r<6;r++) { g[r]=[]; for (let c=0;c<6;c++) g[r][c]=makeTile(r,c); }
  return g;
}

function setB(g, r, c, type, owner) {
  const def = BDEF[type];
  g[r][c].bld   = { type, hp:def.hp, maxHp:def.hp };
  g[r][c].owner = owner;
}
function setU(g, r, c, type, owner) {
  const def = UDEF[type];
  g[r][c].unit  = { type, hp:def.maxHp, maxHp:def.maxHp, acted:false };
  g[r][c].owner = owner;
}

function cheb(r1,c1,r2,c2) { return Math.max(Math.abs(r1-r2),Math.abs(c1-c2)); }

function inBounds(r,c) { return r>=0&&r<6&&c>=0&&c<6; }

// ══════════════════════════════════════════════════════
//  LEVEL SETUP
// ══════════════════════════════════════════════════════
function setupLevel(level) {
  const g = makeGrid();
  if (level === 1) {
    // P1: 1 manor, 1 house, 1 tower
    setB(g,1,2,'manor',1); setB(g,0,0,'house',1); setB(g,0,4,'tower',1);
    // P2: 1 manor, 1 house, 1 tower
    setB(g,4,3,'manor',2); setB(g,5,5,'house',2); setB(g,5,1,'tower',2);
  } else if (level === 2) {
    // P1: 1 manor, 1 house, 1 tower, 1 quarry
    setB(g,1,2,'manor',1); setB(g,0,0,'house',1); setB(g,0,4,'tower',1); setB(g,2,3,'quarry',1);
    // P2: 1 manor, 1 house, 1 tower, 1 wall
    setB(g,4,3,'manor',2); setB(g,5,5,'house',2); setB(g,5,1,'tower',2); setB(g,3,4,'wall',2);
  } else {
    // P1: 1 manor, 1 house, 1 tower, 1 barracks
    setB(g,1,2,'manor',1); setB(g,0,0,'house',1); setB(g,0,4,'tower',1); setB(g,2,3,'barracks',1);
    // P2: 1 manor, 1 house, 2 towers, 1 barracks, 1 wall, 1 archer
    setB(g,4,3,'manor',2); setB(g,5,5,'house',2); setB(g,5,1,'tower',2); setB(g,3,4,'tower',2);
    setB(g,4,2,'barracks',2); setB(g,3,0,'wall',2); setU(g,3,2,'archer',2);
  }
  return g;
}

// ══════════════════════════════════════════════════════
//  FOG OF WAR
// ══════════════════════════════════════════════════════
function updateFog() {
  const g = G.grid;
  // Start: rows 3-5 are fog unless revealed
  for (let r=0;r<6;r++) for (let c=0;c<6;c++) g[r][c].fog = (r>=3);

  // Reveal from P1 buildings and units
  for (let r=0;r<6;r++) for (let c=0;c<6;c++) {
    const t = g[r][c];
    if (t.owner !== 1) continue;
    let rev = 0;
    if (t.bld) {
      const bd = BDEF[t.bld.type];
      if (bd.revealRange) rev = Math.max(rev, bd.revealRange);
    }
    if (t.unit) {
      rev = Math.max(rev, UDEF[t.unit.type].revealRange);
    }
    if (rev > 0) {
      for (let r2=0;r2<6;r2++) for (let c2=0;c2<6;c2++) {
        if (cheb(r,c,r2,c2) <= rev) g[r2][c2].fog = false;
      }
    }
  }
}

// ══════════════════════════════════════════════════════
//  INCOME
// ══════════════════════════════════════════════════════
function collectIncome(player) {
  const res = G.res[player];
  for (let r=0;r<6;r++) for (let c=0;c<6;c++) {
    const t = G.grid[r][c];
    if (t.owner !== player || !t.bld) continue;
    const inc = BDEF[t.bld.type].income;
    if (inc.g) res.g += inc.g;
    if (inc.w) res.w += inc.w;
    if (inc.s) res.s += inc.s;
  }
}

// ══════════════════════════════════════════════════════
//  WALL DAMAGE REDUCTION
// ══════════════════════════════════════════════════════
function wallMult(r, c) {
  const owner = G.grid[r][c].owner;
  const dirs = [[-1,0],[1,0],[0,-1],[0,1]];
  for (const [dr,dc] of dirs) {
    const nr=r+dr, nc=c+dc;
    if (!inBounds(nr,nc)) continue;
    const adj = G.grid[nr][nc];
    if (adj.owner===owner && adj.bld && adj.bld.type==='wall' && adj.bld.hp>0) return 0.7;
  }
  return 1.0;
}

// ══════════════════════════════════════════════════════
//  DAMAGE
// ══════════════════════════════════════════════════════
function dealDamage(r, c, rawDmg, src) {
  const tile = G.grid[r][c];
  const dmg  = Math.round(rawDmg * wallMult(r,c));
  const cls  = tile.owner===1 ? 'lp1' : 'lp2';
  const enemy= tile.owner===1 ? 'lp2' : 'lp1';

  // Hit unit first
  if (tile.unit && tile.unit.hp > 0) {
    tile.unit.hp = Math.max(0, tile.unit.hp - dmg);
    let msg = `${src} hit ${UDEF[tile.unit.type].name}@(${r},${c}) for ${dmg}`;
    if (tile.unit.hp <= 0) { tile.unit = null; msg += ' — killed!'; }
    addLog(msg, enemy);
  } else if (tile.bld) {
    tile.bld.hp = Math.max(0, tile.bld.hp - dmg);
    let msg = `${src} hit ${BDEF[tile.bld.type].name}@(${r},${c}) for ${dmg}`;
    if (tile.bld.hp <= 0) {
      if (tile.bld.type === 'manor') {
        msg += ' — MANOR DESTROYED!';
        addLog(msg, 'lwin');
        flashTile(r,c);
        G.gameOver = true;
        setTimeout(()=>checkWin(), 500);
        return;
      }
      msg += ' — destroyed!';
      tile.bld = null;
      if (!tile.unit) tile.owner = 0;
    }
    addLog(msg, enemy);
  }
  flashTile(r,c);
}

// ══════════════════════════════════════════════════════
//  VISUAL EFFECTS
// ══════════════════════════════════════════════════════
function flashTile(r, c) {
  const el = tileEl(r,c);
  if (!el) return;
  el.classList.remove('hit-flash');
  void el.offsetWidth;
  el.classList.add('hit-flash');
  setTimeout(()=>el.classList.remove('hit-flash'), 450);
}

function animProjectile(sr,sc,tr,tc,emoji) {
  const se = tileEl(sr,sc), te = tileEl(tr,tc);
  if (!se||!te) return;
  const sb=se.getBoundingClientRect(), tb=te.getBoundingClientRect();
  const x1=sb.left+sb.width/2, y1=sb.top+sb.height/2;
  const x2=tb.left+tb.width/2, y2=tb.top+tb.height/2;
  const el = document.createElement('div');
  el.className='projectile';
  el.textContent=emoji;
  el.style.cssText=`left:${x1}px;top:${y1}px;`;
  document.body.appendChild(el);
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    el.style.left=x2+'px'; el.style.top=y2+'px';
  }));
  setTimeout(()=>el.remove(), 600);
}

// ══════════════════════════════════════════════════════
//  WIN CHECK
// ══════════════════════════════════════════════════════
function checkWin() {
  let m1=false, m2=false;
  for (let r=0;r<6;r++) for (let c=0;c<6;c++) {
    const t=G.grid[r][c];
    if (t.bld&&t.bld.type==='manor') { if(t.owner===1)m1=true; if(t.owner===2)m2=true; }
  }
  if (!m2) showWin('🎉 Player 1 Wins!','You destroyed the enemy Manor!');
  else if (!m1) showWin('💀 You Were Defeated','Your Manor was destroyed.');
}

function showWin(title, sub) {
  document.getElementById('win-text').textContent=title;
  document.getElementById('win-sub').textContent=sub;
  document.getElementById('win-overlay').classList.add('vis');
  addLog(title,'lwin');
}

// ══════════════════════════════════════════════════════
//  LOG
// ══════════════════════════════════════════════════════
function addLog(msg, cls='lsys') {
  const ul=document.getElementById('log-list');
  const li=document.createElement('li');
  li.className=cls; li.textContent=msg;
  ul.insertBefore(li, ul.firstChild);
  while(ul.children.length>8) ul.removeChild(ul.lastChild);
}

// ══════════════════════════════════════════════════════
//  HIGHLIGHT HELPERS
// ══════════════════════════════════════════════════════
function clearHL() {
  document.querySelectorAll('.tile').forEach(el=>el.classList.remove('targetable','buildable'));
}

function hlTargets(r, c) {
  clearHL();
  const t = G.grid[r][c];
  if (t.bld && t.bld.type==='tower' && t.owner===1) {
    // Tower: all visible enemy buildings
    for (let r2=0;r2<6;r2++) for (let c2=0;c2<6;c2++) {
      const t2=G.grid[r2][c2];
      if (t2.owner===2 && !t2.fog && t2.bld) tileEl(r2,c2)?.classList.add('targetable');
    }
  }
  if (t.unit && !t.unit.acted && t.owner===1) {
    const ud = UDEF[t.unit.type];
    for (let r2=0;r2<6;r2++) for (let c2=0;c2<6;c2++) {
      const t2=G.grid[r2][c2];
      if (t2.owner===2 && !t2.fog && cheb(r,c,r2,c2)<=ud.range && (t2.bld||t2.unit)) {
        tileEl(r2,c2)?.classList.add('targetable');
      }
    }
  }
}

function hlBuildable() {
  clearHL();
  for (let r=0;r<6;r++) for (let c=0;c<6;c++) {
    const t=G.grid[r][c];
    if (t.owner===1 && !t.bld) tileEl(r,c)?.classList.add('buildable');
  }
}

function hlRepair() {
  clearHL();
  for (let r=0;r<6;r++) for (let c=0;c<6;c++) {
    const t=G.grid[r][c];
    if (t.owner===1 && t.bld && t.bld.hp<t.bld.maxHp) tileEl(r,c)?.classList.add('buildable');
  }
}

function hlBarracks() {
  clearHL();
  for (let r=0;r<6;r++) for (let c=0;c<6;c++) {
    const t=G.grid[r][c];
    if (t.owner===1 && t.bld && t.bld.type==='barracks' && !t.unit) tileEl(r,c)?.classList.add('buildable');
  }
}

// ══════════════════════════════════════════════════════
//  MODE / MENU TOGGLES
// ══════════════════════════════════════════════════════
function setMode(m) {
  if (mode===m) { mode=null; clearHL(); updateButtons(); return; }
  mode=m; bldType=null; unitType=null;
  closeBuildMenu(); closeTrainMenu(); clearHL();
  if (m==='attack') addLog('Select your Tower or Unit, then click a target.','lsys');
  if (m==='repair') { hlRepair(); addLog('Click a damaged building to repair (+10HP for 5g).','lsys'); }
  updateButtons();
}

function toggleBuild() {
  const sub=document.getElementById('submenu');
  if (sub.classList.contains('vis')) { closeBuildMenu(); mode=null; clearHL(); updateButtons(); return; }
  mode='build'; bldType=null; unitType=null;
  closeTrainMenu(); clearHL();
  populateBuildMenu();
  sub.classList.add('vis');
  updateButtons();
}
function closeBuildMenu() { document.getElementById('submenu').classList.remove('vis'); }

function toggleTrain() {
  const sub=document.getElementById('train-submenu');
  if (sub.classList.contains('vis')) { closeTrainMenu(); mode=null; clearHL(); updateButtons(); return; }
  mode='train'; bldType=null; unitType=null;
  closeBuildMenu(); clearHL();
  populateTrainMenu();
  sub.classList.add('vis');
  updateButtons();
}
function closeTrainMenu() { document.getElementById('train-submenu').classList.remove('vis'); }

function populateBuildMenu() {
  const sub=document.getElementById('submenu'), res=G.res[1];
  sub.innerHTML='';
  for (const bt of BUILDABLE) {
    const def=BDEF[bt];
    const cp=[];
    if(def.cost.g) cp.push(def.cost.g+'🪙');
    if(def.cost.w) cp.push(def.cost.w+'🪵');
    if(def.cost.s) cp.push(def.cost.s+'⛏');
    const ok = canAfford(res, def.cost);
    const b=document.createElement('button');
    b.className='sbtn'; b.disabled=!ok;
    b.innerHTML=`${def.emoji} ${def.name} <span class="cost">${cp.join(' ')}</span>`;
    b.onclick=()=>{ bldType=bt; hlBuildable(); addLog(`Select a tile to build ${def.name}.`,'lsys'); };
    sub.appendChild(b);
  }
}

function populateTrainMenu() {
  const sub=document.getElementById('train-submenu'), res=G.res[1];
  sub.innerHTML='';
  for (const [ut,ud] of Object.entries(UDEF)) {
    const ok=canAfford(res,ud.cost);
    const b=document.createElement('button');
    b.className='sbtn'; b.disabled=!ok;
    b.innerHTML=`${ud.emoji} ${ud.name} <span class="cost">${ud.cost.g}🪙 ${ud.cost.w}🪵</span>`;
    b.onclick=()=>{ unitType=ut; hlBarracks(); addLog(`Select a Barracks to train ${ud.name}.`,'lsys'); };
    sub.appendChild(b);
  }
}

function canAfford(res, cost) {
  return (!cost.g||res.g>=cost.g) && (!cost.w||res.w>=cost.w) && (!cost.s||res.s>=cost.s);
}

function spend(res, cost) {
  res.g -= cost.g||0; res.w -= cost.w||0; res.s -= cost.s||0;
}

// ══════════════════════════════════════════════════════
//  TILE CLICK
// ══════════════════════════════════════════════════════
function onTileClick(r, c) {
  if (!G || G.gameOver || G.currentPlayer!==1) return;
  const tile=G.grid[r][c];
  if (tile.fog) return;

  // REPAIR
  if (mode==='repair') {
    if (tile.owner===1 && tile.bld && tile.bld.hp<tile.bld.maxHp) {
      if (G.res[1].g<5) { addLog('Not enough gold!','lsys'); return; }
      G.res[1].g -= 5;
      tile.bld.hp = Math.min(tile.bld.maxHp, tile.bld.hp+10);
      addLog(`Repaired ${BDEF[tile.bld.type].name}@(${r},${c}) +10HP`,'lp1');
      mode=null; clearHL(); renderAll(); endPlayerTurn();
    }
    return;
  }

  // BUILD
  if (mode==='build' && bldType) {
    if (tile.owner===1 && !tile.bld) {
      const def=BDEF[bldType], res=G.res[1];
      if (!canAfford(res,def.cost)) { addLog('Not enough resources!','lsys'); return; }
      spend(res,def.cost);
      tile.bld={type:bldType,hp:def.hp,maxHp:def.hp};
      addLog(`Built ${def.name}@(${r},${c})`,'lp1');
      bldType=null; mode=null; closeBuildMenu(); clearHL();
      updateFog(); renderAll(); endPlayerTurn();
    }
    return;
  }

  // TRAIN
  if (mode==='train' && unitType) {
    if (tile.owner===1 && tile.bld && tile.bld.type==='barracks' && !tile.unit) {
      const ud=UDEF[unitType], res=G.res[1];
      if (!canAfford(res,ud.cost)) { addLog('Not enough resources!','lsys'); return; }
      spend(res,ud.cost);
      tile.unit={type:unitType,hp:ud.maxHp,maxHp:ud.maxHp,acted:false};
      addLog(`Trained ${ud.name}@(${r},${c})`,'lp1');
      unitType=null; mode=null; closeTrainMenu(); clearHL();
      renderAll(); endPlayerTurn();
    }
    return;
  }

  // ATTACK — two-step: pick source then pick target
  if (mode==='attack') {
    const el=tileEl(r,c);
    // If clicking a targetable tile and we have a source selected
    if (selTile && el && el.classList.contains('targetable')) {
      doPlayerAttack(selTile.r, selTile.c, r, c);
      return;
    }
    // Select attack source
    if (tile.owner===1 && ((tile.bld&&tile.bld.type==='tower')||(tile.unit&&!tile.unit.acted))) {
      selTile={r,c};
      document.querySelectorAll('.tile').forEach(e=>e.classList.remove('selected'));
      el?.classList.add('selected');
      hlTargets(r,c);
      return;
    }
    return;
  }

  // DEFAULT: just select for info
  document.querySelectorAll('.tile').forEach(e=>e.classList.remove('selected'));
  tileEl(r,c)?.classList.add('selected');
  selTile={r,c};
  let info=`(${r},${c}) | Owner: ${['None','P1','P2'][tile.owner]}`;
  if (tile.bld)  info+=` | ${BDEF[tile.bld.type].name} HP:${tile.bld.hp}/${tile.bld.maxHp}`;
  if (tile.unit) info+=` | ${UDEF[tile.unit.type].name} HP:${tile.unit.hp}/${tile.unit.maxHp}`;
  addLog(info,'lsys');
}

function doPlayerAttack(sr,sc,tr,tc) {
  const src=G.grid[sr][sc], res=G.res[1];
  // Tower
  if (src.bld && src.bld.type==='tower') {
    if (res.g<10) { addLog('Not enough gold for tower shot!','lsys'); return; }
    res.g-=10;
    animProjectile(sr,sc,tr,tc,'⚡');
    addLog(`P1 Tower fires at (${tr},${tc})!`,'lp1');
    setTimeout(()=>{ dealDamage(tr,tc,15,'P1 Tower'); renderAll(); endPlayerTurn(); }, 350);
  } else if (src.unit && !src.unit.acted) {
    const ud=UDEF[src.unit.type];
    if (cheb(sr,sc,tr,tc)>ud.range) { addLog('Out of range!','lsys'); return; }
    const emoji=src.unit.type==='archer'?'🏹':'⚔️';
    animProjectile(sr,sc,tr,tc,emoji);
    src.unit.acted=true;
    addLog(`P1 ${ud.name} attacks (${tr},${tc})!`,'lp1');
    setTimeout(()=>{ dealDamage(tr,tc,ud.dmg,`P1 ${ud.name}`); renderAll(); endPlayerTurn(); }, 350);
  }
  mode=null; selTile=null; clearHL();
  document.querySelectorAll('.tile').forEach(e=>e.classList.remove('selected'));
  updateButtons(); renderAll();
}

// ══════════════════════════════════════════════════════
//  END PLAYER TURN
// ══════════════════════════════════════════════════════
function endPlayerTurn() {
  if (!G||G.gameOver) return;
  mode=null; bldType=null; unitType=null; selTile=null;
  closeBuildMenu(); closeTrainMenu(); clearHL();
  document.querySelectorAll('.tile').forEach(e=>e.classList.remove('selected'));
  G.currentPlayer=2; G.turn++;
  addLog(`── Turn ${G.turn}: AI thinking ──`,'lsys');
  updateUI(); renderAll();
  setTimeout(aiTurn, 500);
}

// ══════════════════════════════════════════════════════
//  AI TURN
// ══════════════════════════════════════════════════════
function aiTurn() {
  if (!G||G.gameOver) return;
  const lv=G.level, res=G.res[2];

  // 1. Repair manor if low HP
  for (let r=3;r<6;r++) for (let c=0;c<6;c++) {
    const t=G.grid[r][c];
    if (t.owner===2&&t.bld&&t.bld.type==='manor'&&t.bld.hp<25&&res.g>=5) {
      res.g-=5; t.bld.hp=Math.min(t.bld.maxHp,t.bld.hp+10);
      addLog(`AI repaired Manor@(${r},${c})`,'lp2');
    }
  }

  // 2. Fire towers (all levels attack; L1 only every other turn)
  const shouldAtk = lv===1 ? (G.turn%2===0) : true;
  const p1Blds=allP1Buildings();

  if (shouldAtk && p1Blds.length>0) {
    for (let r=3;r<6;r++) for (let c=0;c<6;c++) {
      if (G.gameOver) return;
      const t=G.grid[r][c];
      if (t.owner!==2||!t.bld||t.bld.type!=='tower') continue;
      if (res.g<10) break;
      const tgt=pickTarget(p1Blds);
      if (!tgt) continue;
      res.g-=10;
      animProjectile(r,c,tgt.r,tgt.c,'⚡');
      addLog(`AI Tower@(${r},${c}) fires at (${tgt.r},${tgt.c})!`,'lp2');
      const {r:tr,c:tc}=tgt;
      setTimeout(()=>{ if(!G.gameOver){dealDamage(tr,tc,15,'AI Tower'); renderAll();} },350);
    }
  }

  // 3. Act AI units
  setTimeout(()=>{
    if (G.gameOver) return;
    const p1Tgts=allP1Targets();
    for (let r=3;r<6;r++) for (let c=0;c<6;c++) {
      if (G.gameOver) break;
      const t=G.grid[r][c];
      if (t.owner!==2||!t.unit||t.unit.acted) continue;
      const ud=UDEF[t.unit.type];
      // Find best in-range target
      let best=null, bestHp=Infinity;
      for (const tg of p1Tgts) {
        if (cheb(r,c,tg.r,tg.c)<=ud.range && tg.hp<bestHp) { bestHp=tg.hp; best=tg; }
      }
      if (best) {
        t.unit.acted=true;
        const emoji=t.unit.type==='archer'?'🏹':'⚔️';
        animProjectile(r,c,best.r,best.c,emoji);
        addLog(`AI ${ud.name}@(${r},${c}) attacks (${best.r},${best.c})!`,'lp2');
        const {r:br,c:bc,dmg}={r:best.r,c:best.c,dmg:ud.dmg};
        setTimeout(()=>{ if(!G.gameOver){dealDamage(br,bc,dmg,`AI ${ud.name}`); renderAll();} },350);
      }
    }

    // 4+5. Build and train
    setTimeout(()=>{
      if (G.gameOver) return;
      aiBuild(lv, res);
      aiTrain(lv, res);

      // End AI turn
      setTimeout(()=>{
        if (G.gameOver) return;
        collectIncome(1); collectIncome(2);
        // reset acted flags
        for (let r=0;r<6;r++) for (let c=0;c<6;c++) { if(G.grid[r][c].unit) G.grid[r][c].unit.acted=false; }
        G.currentPlayer=1;
        updateFog();
        addLog(`── Turn ${G.turn}: Your turn ──`,'lsys');
        updateUI(); renderAll();
      }, 400);
    }, 500);
  }, 700);
}

function allP1Buildings() {
  const out=[];
  for (let r=0;r<6;r++) for (let c=0;c<6;c++) {
    const t=G.grid[r][c];
    if (t.owner===1 && t.bld) out.push({r,c,hp:t.bld.hp,type:t.bld.type});
  }
  return out;
}

function allP1Targets() {
  const out=[];
  for (let r=0;r<6;r++) for (let c=0;c<6;c++) {
    const t=G.grid[r][c];
    if (t.owner!==1) continue;
    if (t.unit)  out.push({r,c,hp:t.unit.hp});
    else if (t.bld) out.push({r,c,hp:t.bld.hp});
  }
  return out;
}

function pickTarget(targets) {
  // Sort by lowest HP, prefer manor
  const manors=targets.filter(t=>t.type==='manor');
  if (manors.length>0) return manors.reduce((a,b)=>a.hp<b.hp?a:b);
  if (targets.length===0) return null;
  return targets.reduce((a,b)=>a.hp<b.hp?a:b);
}

function aiBuild(lv, res) {
  // Find empty p2 tiles (rows 3-5 owned by p2 without a building)
  const slots=[];
  for (let r=3;r<6;r++) for (let c=0;c<6;c++) {
    const t=G.grid[r][c];
    if (t.owner===2&&!t.bld) slots.push({r,c});
  }
  if (!slots.length) return;
  const slot=slots[Math.floor(Math.random()*slots.length)];

  let bt=null;
  if (lv===1) {
    if (canAfford(res,BDEF.house.cost)) bt='house';
  } else if (lv===2) {
    if (canAfford(res,BDEF.wall.cost))  bt='wall';
    else if (canAfford(res,BDEF.tower.cost)) bt='tower';
    else if (canAfford(res,BDEF.house.cost)) bt='house';
  } else {
    if (canAfford(res,BDEF.tower.cost))   bt='tower';
    else if (canAfford(res,BDEF.barracks.cost)) bt='barracks';
    else if (canAfford(res,BDEF.wall.cost)) bt='wall';
    else if (canAfford(res,BDEF.house.cost)) bt='house';
  }
  if (!bt) return;
  const def=BDEF[bt];
  spend(res,def.cost);
  G.grid[slot.r][slot.c].bld={type:bt,hp:def.hp,maxHp:def.hp};
  G.grid[slot.r][slot.c].owner=2;
  addLog(`AI built ${def.name}@(${slot.r},${slot.c})`,'lp2');
}

function aiTrain(lv, res) {
  if (lv<2) return;
  const utype=lv>=3?'knight':'archer';
  const ud=UDEF[utype];
  for (let r=3;r<6;r++) for (let c=0;c<6;c++) {
    const t=G.grid[r][c];
    if (t.owner===2&&t.bld&&t.bld.type==='barracks'&&!t.unit&&canAfford(res,ud.cost)) {
      spend(res,ud.cost);
      t.unit={type:utype,hp:ud.maxHp,maxHp:ud.maxHp,acted:true};
      addLog(`AI trained ${ud.name}@(${r},${c})`,'lp2');
    }
  }
}

// ══════════════════════════════════════════════════════
//  RENDER
// ══════════════════════════════════════════════════════
function tileEl(r,c) { return document.querySelector(`[data-r="${r}"][data-c="${c}"]`); }

function renderAll() {
  for (let r=0;r<6;r++) for (let c=0;c<6;c++) renderTile(r,c);
  updateUI();
}

function renderTile(r, c) {
  const el=tileEl(r,c);
  if (!el) return;
  const tile=G.grid[r][c];

  // Preserve animation/highlight classes
  const sel=el.classList.contains('selected');
  const tgt=el.classList.contains('targetable');
  const bld=el.classList.contains('buildable');
  const hit=el.classList.contains('hit-flash');

  el.className='tile';
  if (sel) el.classList.add('selected');
  if (tgt) el.classList.add('targetable');
  if (bld) el.classList.add('buildable');
  if (hit) el.classList.add('hit-flash');
  el.innerHTML='';

  if (tile.fog) {
    el.classList.add('fog');
    const fi=document.createElement('div'); fi.className='fog-icon'; fi.textContent='🌫️';
    el.appendChild(fi);
    return;
  }

  if (tile.owner===1) el.classList.add('owner-p1');
  else if (tile.owner===2) el.classList.add('owner-p2');

  if (tile.bld) {
    const be=document.createElement('div'); be.className='t-building';
    be.textContent=BDEF[tile.bld.type].emoji; el.appendChild(be);
  }
  if (tile.unit) {
    const ue=document.createElement('div'); ue.className='t-unit';
    ue.textContent=UDEF[tile.unit.type].emoji; el.appendChild(ue);
    if (tile.unit.acted) {
      const d=document.createElement('div'); d.className='acted-dot'; el.appendChild(d);
    }
  }

  // HP bars
  const bars=document.createElement('div'); bars.className='hp-bars';
  if (tile.unit) {
    const w=document.createElement('div'); w.className='hpbw';
    const f=document.createElement('div'); f.className='hpbf unit';
    f.style.width=(tile.unit.hp/tile.unit.maxHp*100)+'%';
    w.appendChild(f); bars.appendChild(w);
  }
  if (tile.bld) {
    const w=document.createElement('div'); w.className='hpbw';
    const f=document.createElement('div'); f.className='hpbf bldg';
    f.style.width=(tile.bld.hp/tile.bld.maxHp*100)+'%';
    w.appendChild(f); bars.appendChild(w);
  }
  el.appendChild(bars);
}

function updateUI() {
  if (!G) return;
  const r1=G.res[1], r2=G.res[2];
  document.getElementById('p1g').textContent=r1.g;
  document.getElementById('p1w').textContent=r1.w;
  document.getElementById('p1s').textContent=r1.s;
  document.getElementById('p2g').textContent=r2.g;
  document.getElementById('p2w').textContent=r2.w;
  document.getElementById('p2s').textContent=r2.s;

  const ti=document.getElementById('turn-ind');
  if (G.currentPlayer===1) { ti.textContent="⚔ Player 1's Turn"; ti.style.color='#6699ff'; }
  else                      { ti.textContent="🤖 AI's Turn";       ti.style.color='#ff7766'; }
  document.getElementById('turn-num').textContent=`Turn ${G.turn}`;
  updateButtons();
}

function updateButtons() {
  const on=G&&G.currentPlayer===1&&!G.gameOver;
  ['btn-attack','btn-build','btn-train','btn-repair','btn-end'].forEach(id=>{
    document.getElementById(id).disabled=!on;
  });
  document.getElementById('btn-attack').classList.toggle('active',mode==='attack');
  document.getElementById('btn-build').classList.toggle('active', mode==='build');
  document.getElementById('btn-train').classList.toggle('active', mode==='train');
  document.getElementById('btn-repair').classList.toggle('active',mode==='repair');
}

// ══════════════════════════════════════════════════════
//  GRID DOM BUILD
// ══════════════════════════════════════════════════════
function buildGridDOM() {
  const el=document.getElementById('grid'); el.innerHTML='';
  for (let r=0;r<6;r++) for (let c=0;c<6;c++) {
    const d=document.createElement('div');
    d.className='tile'; d.dataset.r=r; d.dataset.c=c;
    d.addEventListener('click',()=>onTileClick(r,c));
    el.appendChild(d);
  }
}

// ══════════════════════════════════════════════════════
//  START / MENU
// ══════════════════════════════════════════════════════
function startGame(level) {
  G={
    level, turn:1, currentPlayer:1, gameOver:false,
    grid: setupLevel(level),
    res: { 1:{g:60,w:20,s:10}, 2:{g:60,w:20,s:10} },
  };
  mode=null; bldType=null; unitType=null; selTile=null;

  document.getElementById('start-menu').style.display='none';
  document.getElementById('game-area').style.display='flex';
  document.getElementById('win-overlay').classList.remove('vis');
  document.getElementById('log-list').innerHTML='';

  buildGridDOM();
  updateFog();
  addLog(`Level ${level} — Valley Skirmish, Stone Fortress, Iron War`.split(', ')[level-1]+' started!'  ,'lsys');
  renderAll();
